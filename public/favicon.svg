<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#00D4D4" rx="256"/>
  
  <!-- Speech bubble tail -->
  <polygon points="580,850 720,950 650,850" fill="#00D4D4"/>
  
  <!-- Brain outline -->
  <g transform="translate(512, 400)">
    <!-- Left hemisphere -->
    <path d="M -280 -120 Q -320 -80 -320 40 Q -320 140 -220 200 Q -140 240 -80 240 Q -40 240 0 220 L 0 -200 Q -80 -180 -140 -160 Q -200 -140 -280 -120 Z" fill="#001A1A" stroke="none"/>
    
    <!-- Right hemisphere -->
    <path d="M 280 -120 Q 320 -80 320 40 Q 320 140 220 200 Q 140 240 80 240 Q 40 240 0 220 L 0 -200 Q 80 -180 140 -160 Q 200 -140 280 -120 Z" fill="#001A1A" stroke="none"/>
    
    <!-- Center dividing line with caduceus (medical staff) -->
    <!-- Caduceus shaft -->
    <rect x="-8" y="-100" width="16" height="280" fill="#001A1A"/>
    
    <!-- Top circle of caduceus -->
    <circle cx="0" cy="-120" r="28" fill="none" stroke="#001A1A" stroke-width="24"/>
    
    <!-- Snakes/coils around shaft -->
    <!-- Left coil -->
    <path d="M -40 -60 Q -80 -40 -80 20 Q -80 60 -40 80" fill="none" stroke="#001A1A" stroke-width="20" stroke-linecap="round"/>
    <!-- Right coil -->
    <path d="M 40 -60 Q 80 -40 80 20 Q 80 60 40 80" fill="none" stroke="#001A1A" stroke-width="20" stroke-linecap="round"/>
    
    <!-- Bottom coil intersection points -->
    <circle cx="-60" cy="0" r="16" fill="#00D4D4"/>
    <circle cx="60" cy="0" r="16" fill="#00D4D4"/>
  </g>
</svg>